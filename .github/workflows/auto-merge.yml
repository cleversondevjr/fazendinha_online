name: Auto Merge PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'google-labs-jules[bot]' || github.actor == 'cleversondevjr'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Automerge PR
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repository = context.repo;

            console.log(`Tentando mesclar PR #${prNumber} de ${github.actor}...`);

            try {
              await github.rest.pulls.merge({
                owner: repository.owner,
                repo: repository.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              console.log(`PR #${prNumber} mesclado com sucesso!`);
            } catch (error) {
              console.error(`Falha no merge direto, habilitando auto-merge:`, error.message);
              try {
                await github.rest.pulls.update({
                  owner: repository.owner,
                  repo: repository.repo,
                  pull_number: prNumber,
                  auto_merge_allowed: true
                });
                console.log(`Auto-merge habilitado para PR #${prNumber}`);
              } catch (e) {
                console.error(`Erro ao configurar auto-merge:`, e.message);
              }
            }
