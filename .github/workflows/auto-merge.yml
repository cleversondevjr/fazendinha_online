name: Auto Merge PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Permitir que a Jules e o proprietário disparem o auto-merge
    if: |
      github.event.pull_request.user.login == 'google-labs-jules[bot]' ||
      github.event.pull_request.user.login == 'Cleversondevjr'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Automerge PR
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repository = context.repo;

            console.log(`Verificando PR #${prNumber} enviado por ${context.payload.pull_request.user.login}...`);

            try {
              // Tenta o merge imediato
              await github.rest.pulls.merge({
                owner: repository.owner,
                repo: repository.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              console.log(`✅ PR #${prNumber} mesclado com sucesso via Squash!`);
            } catch (error) {
              console.log(`⚠️ Merge direto falhou (pode haver restrições de branch): ${error.message}`);

              // Tenta habilitar a flag de auto-merge do GitHub (requer que a opção esteja ativa no Repo)
              try {
                const query = `
                  mutation($id: ID!) {
                    enablePullRequestAutoMerge(input: {pullRequestId: $id, mergeMethod: SQUASH}) {
                      pullRequest { autoMergeRequest { enabledAt } }
                    }
                  }
                `;
                const variables = { id: context.payload.pull_request.node_id };
                await github.graphql(query, variables);
                console.log(`🚀 Auto-merge ativado via GraphQL para o PR #${prNumber}`);
              } catch (graphQLError) {
                console.error(`❌ Não foi possível ativar auto-merge:`, graphQLError.message);
                console.log(`DICA: Verifique se "Allow auto-merge" está marcado em Settings -> General do GitHub.`);
              }
            }
