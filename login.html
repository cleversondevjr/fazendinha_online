<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fazendinha Online</title>
    <style>
        body {
            background: #2c1a32;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #4a2c55;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #764191;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #8e52ad;
        }
        .logo {
            width: 100px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="assets/logo_fazendinha_online.png" alt="Logo" class="logo">
        <h2>Entrar</h2>
        <input type="text" id="username" placeholder="ID do Usuário (ex: 1)">
        <button onclick="doLogin()">Entrar na Fazenda</button>
    </div>

    <script>
        function doLogin() {
            const id = document.getElementById('username').value;
            if (!id) return alert('Digite um ID');

            // Define o cookie para o domínio principal para que o backend consiga ler
            // O backend espera o cookie 'usuario_id'
            document.cookie = "usuario_id=" + id + "; path=/; max-age=" + (30 * 24 * 60 * 60);

            // Redireciona para o jogo
            window.location.href = "./";
        }
    </script>
</body>
</html>
