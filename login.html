<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fazendinha Online</title>
    <base href="/fazendinha/">
    <style>
        :root { --login-bg: url('assets/ui/login_manha.png'); }
        body { font-family: 'Segoe UI', sans-serif; background-image: var(--login-bg); background-size: cover; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #2d5a27; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #56ab2f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .footer { margin-top: 1.5rem; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="login-card" id="card-login">
        <img src="assets/logo_fazendinha_online.png" alt="Logo" style="width: 150px; margin-bottom: 1rem;">
        <h1>Acessar Fazenda</h1>
        <p id="restricted-msg" style="color: red; font-size: 12px; display: none;">Acesso restrito. Use o painel SGIPTV.</p>
        <input type="text" id="login-user" placeholder="Login" disabled>
        <input type="password" id="login-pass" placeholder="Senha" disabled>
        <button id="login-btn" onclick="fazerLogin()" disabled>Entrar na Fazenda</button>
        <div style="margin-top:15px; display:flex; justify-content:space-between; font-size:12px;">
            <a href="#" onclick="showCard('card-register')">Criar Conta</a>
            <a href="#" onclick="showCard('card-recover')">Recuperar Senha</a>
        </div>
        <div class="footer">SG IPTV - <span id="game-version-display">v3.0.6</span></div>
    </div>
    <script>
        (function checkRestricted() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('admin') === 'true') {
                document.getElementById('login-user').disabled = false;
                document.getElementById('login-pass').disabled = false;
                document.getElementById('login-btn').disabled = false;
            } else {
                document.getElementById('restricted-msg').style.display = 'block';
            }
        })();
        async function fazerLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            try {
                const res = await fetch('api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: user, password: pass })
                });
                const data = await res.json();
                if (data.success) window.location.href = './index.html';
                else alert(data.error);
            } catch (err) { alert('Erro na conexão'); }
        }
    </script>
</body>
</html>
