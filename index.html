<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fazendinha Online</title>
  <base href="/fazendinha/">
  <link rel="stylesheet" href="style.css?v=3.0.5">
</head>
<body>
  <header class="topbar">
    <div class="topbar-main">
      <div class="logo"><img src="assets/logo_fazendinha_online.png" alt="Fazendinha Online" class="logo-icon"></div>
      <div class="game-version">v3.0.5</div>
    </div>
    <div class="topbar-actions">
      <button class="menu-btn-compact menu-top-btn open-shop" type="button"><img src="assets/botao_loja.png" alt="Loja" class="menu-icon-compact"></button>
      <button class="menu-btn-compact menu-top-btn open-inventory" type="button"><img src="assets/botao_inventario.png" alt="Inventário" class="menu-icon-compact"></button>
      <button class="menu-btn-compact menu-top-btn open-worldtree" type="button"><img src="assets/botao_arvore_mundial.png" alt="Árvore Mundial" class="menu-icon-compact"></button>
      <button class="resource resource-btn resource-ouro" type="button"><img src="assets/ouro.png" alt="" class="resource-icon"><span id="coins">1000</span></button>
      <button class="resource resource-btn resource-diamond" type="button"><img src="assets/diamante.png" alt="" class="resource-icon"><span id="diamonds">0</span></button>
      <button class="resource resource-btn resource-energy" type="button"><img src="assets/energia.png" alt="" class="resource-icon"><span id="energy">99999</span></button>
      <button class="menu-btn-compact harvest open-harvest" type="button"><img src="assets/botao_coletar_tudo.png" alt="Colher Tudo" class="menu-icon-compact"></button>
      <button class="menu-btn-compact logout-btn" type="button"><img src="assets/botao_sair.png" alt="Sair" class="menu-icon-compact"></button>
    </div>
  </header>
  <aside class="sidebar">
    <div class="tools-header"><img src="assets/botao_ferramentas.png" alt="Ferramentas"></div>
    <div class="tool-item" data-item="vasoPequeno"><img src="assets/vaso_pequeno.png" class="tool-icon"><span class="count" id="count-vaso-pequeno">0</span></div>
    <div class="tool-item" data-item="vasoGrande"><img src="assets/vaso_grande.png" class="tool-icon"><span class="count" id="count-vaso-grande">0</span></div>
    <div class="tool-item" data-item="agua"><img src="assets/agua.png" class="tool-icon"><span class="count" id="count-agua">0</span></div>
    <div class="tool-item" data-item="pesticida"><img src="assets/borrifador_inseticida.png" class="tool-icon"><span class="count" id="count-pesticida">0</span></div>
    <div class="tool-item" data-item="espantalho"><img src="assets/espantalho.png" class="tool-icon"><span class="count" id="count-espantalho">0</span></div>
    <div class="tool-item" data-item="flower"><img src="assets/flor.png" class="tool-icon"><span class="count" id="count-flower">0</span></div>
    <div class="tool-item" data-item="tree"><img src="assets/folha.png" class="tool-icon"><span class="count" id="count-tree">0</span></div>
    <div class="tool-item" data-item="sementeEspecial"><img src="assets/semente.png" class="tool-icon"><span class="count" id="count-special-seed">0</span></div>
    <div class="sidebar-spacer"></div>
    <section class="rewards-panel" id="rewards-panel"><div class="panel-title">Recompensas</div><div class="missions-list" id="missions-list"></div></section>
    <div class="weather-panel"><img src="assets/caixa_clima.png" alt="" class="weather-icon" id="weather-icon"></div>
    <div class="menu-buttons"></div>
  </aside>
  <main class="main"><div id="plot-grid" class="plot-grid"></div></main>
  <div class="admin-floating-container"><div class="game-version-footer">v3.0.5</div><button id="admin-open" class="admin-floating-btn" type="button">Admin</button></div>
  <script src="script.js?v=3.0.5"></script>
</body>
</html>
